# ============================================================
# ArgoCD Application — Bootstrap
# ============================================================
# Bu dosya ArgoCD'ye elle apply edilir (bir kerelik):
#   kubectl apply -f k8s/argocd/application.yaml
#
# Sonrasında ArgoCD, k8s/ klasörünü izler ve değişiklikleri
# otomatik olarak cluster'a sync eder.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mentorify
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: mentorify
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/ulasdemir472/mentorify-infra.git
    targetRevision: main
    path: .
    # Kustomize kullanımı
    kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: mentorify

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health check customization
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
