apiVersion: v1
kind: ConfigMap
metadata:
  name: mentorify-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1" # Grafana sidecar'ın bunu tanıması için şart
spec:
  mentorify-main.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Mentorify - CPU Usage (Cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace='mentorify'}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Mentorify - Memory Usage (Bytes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace='mentorify',container!='POD',container!=''}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Backend - Request Rate (Internal)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(irate(container_network_receive_packets_total{namespace='mentorify', pod=~'backend.*'}[5m]))",
              "legendFormat": "Packets Recv"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion: 36,
      "style": "dark",
      "tags": ["mentorify"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Mentorify Main Dashboard",
      "uid": "mentorify-main"
    }
