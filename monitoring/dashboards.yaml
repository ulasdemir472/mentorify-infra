apiVersion: v1
kind: ConfigMap
metadata:
  name: mentorify-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mentorify-main.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "TOP 5 CPU Consumers (Entire Cluster)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "topk(5, sum(rate(container_cpu_usage_seconds_total{container!='', container!='POD'}[5m])) by (pod, namespace))",
              "legendFormat": "{{namespace}} / {{pod}}"
            }
          ]
        },
        {
          "title": "Mentorify - CPU Usage (Cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='mentorify', container!='', container!='POD'}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Mentorify - Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "decbytes" } },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace='mentorify', container!='', container!='POD'}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["mentorify"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Mentorify Main Dashboard",
      "uid": "mentorify-main"
    }
