apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentorify-ingress
  namespace: mentorify
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: mentorify.89.252.153.121.sslip.io
      http:
        paths:
          # 1. Sadece /api/v1 ile başlayanları Backend'e gönder
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          # 2. Resimler/Uploadlar yine Backend'e gitsin
          - path: /public/uploads
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          # 3. WebSocket (Socket.IO) Backend'e gitsin
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          # 4. Geri kalan her şey (Next.js API'ları /api/auth dahil) Frontend'e gitsin
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
