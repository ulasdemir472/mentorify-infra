apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentorify-ingress
  namespace: mentorify
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    # Ana IP adresi (Host header olmadan erişim için deneme)
    - http:
        paths: &paths
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
    # sslip.io alternatifi
    - host: mentorify.89.252.153.121.sslip.io
      http:
        paths: *paths
