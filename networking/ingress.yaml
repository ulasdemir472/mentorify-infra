apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentorify-ingress
  namespace: mentorify
  labels:
    app.kubernetes.io/part-of: mentorify
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: mentorify.89.252.153.121.nip.io
      http:
        paths:
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          # WebSocket (Socket.IO)
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          # Static uploads
          - path: /public/uploads
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          # Frontend — catch-all (en sona)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
