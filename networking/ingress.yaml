apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentorify-ingress
  namespace: mentorify
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    # 1. Cloudflare üzerinden gelecek olan ana domain
    - host: mentorify.devlermedya.net
      http:
        paths: &paths
          # Sadece /api/v1 Backend'e gider
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          - path: /public/uploads
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8800
          # Diğer her şey (Next.js API'ları dahil) Frontend'e gider
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
    - host: grafana.mentorify.devlermedya.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-stack-grafana
                port:
                  number: 80
    # 2. Alternatif olarak sslip.io ve IP (Yine aynı kurallar geçerli)
    - host: mentorify.89.252.153.121.sslip.io
      http:
        paths: *paths
    - http:
        paths: *paths
