# ============================================================
# SEALED SECRET TEMPLATE — DO NOT COMMIT WITH REAL VALUES
# ============================================================
# Usage:
#   1. Fill in real values (base64 encoded)
#   2. Run: kubeseal --format yaml < backend-secret.yaml > backend-sealed-secret.yaml
#   3. Commit ONLY the sealed version to git
#   4. Delete this file from git (keep locally)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: mentorify
  labels:
    app.kubernetes.io/part-of: mentorify
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # MongoDB connection (internal k8s MongoDB)
  MONGO_URL: "mongodb://mentorify:CHANGE_ME@mongodb-svc.mentorify.svc.cluster.local:27017/mentorify?authSource=mentorify"

  # JWT / Session
  SECRET: "CHANGE_ME"
  SESSION_SECRET: "CHANGE_ME"

  # Google OAuth
  CLIENT_ID: "CHANGE_ME"
  CLIENT_SECRET: "CHANGE_ME"

  # Stripe
  STRIPE_SECRET_KEY: "CHANGE_ME"

  # Email
  EMAIL_USER: "CHANGE_ME"
  EMAIL_PASS: "CHANGE_ME"

  # Iyzico Payment
  IYZICO_API_KEY: "CHANGE_ME"
  IYZICO_API_SECRET_KEY: "CHANGE_ME"
