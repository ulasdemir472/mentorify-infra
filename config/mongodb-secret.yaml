# ============================================================
# SEALED SECRET TEMPLATE — DO NOT COMMIT WITH REAL VALUES
# ============================================================
# Usage:
#   1. Fill in real values
#   2. Run: kubeseal --format yaml < mongodb-secret.yaml > mongodb-sealed-secret.yaml
#   3. Commit ONLY the sealed version to git
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: mentorify
  labels:
    app.kubernetes.io/part-of: mentorify
    app.kubernetes.io/component: mongodb
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME_ROOT_PASSWORD"
  MONGO_APP_USERNAME: "mentorify"
  MONGO_APP_PASSWORD: "CHANGE_ME_APP_PASSWORD"
